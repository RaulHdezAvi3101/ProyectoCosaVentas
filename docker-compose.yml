# mio — infra local (Fase 0+)
# Uso: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: mio-postgres
    environment:
      POSTGRES_USER: mio
      POSTGRES_PASSWORD: mio
      POSTGRES_DB: mio
    ports:
      - "5432:5432"
    volumes:
      - mio_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mio -d mio"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mio-redis
    ports:
      - "6379:6379"
    volumes:
      - mio_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mio_pg_data:
  mio_redis_data:
