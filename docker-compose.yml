# Fase 3 — servicios locales (ver web/PHASE3.md)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cosaventas
      POSTGRES_PASSWORD: cosaventas
      POSTGRES_DB: cosaventas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosaventas"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
